<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisão</title>
    <style>
        :root{--fundo:#121212;--texto:#ffffff;--cinza:#b3b3b3}body{margin:0;background:var(--fundo);color:var(--texto);font-family:ui-sans-serif,system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}
        main{width:100%;max-width:28.125rem;display:flex;flex-direction:column;padding:1.5rem;box-sizing:border-box}
        figure{display:flex;align-items:center;justify-content:center;padding:1.25rem 0;margin:0;flex:none}
        .capa{width:100%;aspect-ratio:1/1;background:#282828;border-radius:.5rem;box-shadow:0 .5rem 2rem rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center}
        .faixa{margin-bottom:2rem}
        h2{margin:0;font-size:1.5rem;font-weight:700;min-height:1.2em}
        .progresso{margin-bottom:2rem}
        #barra{width:100%;height:.25rem;background:rgba(255,255,255,0.1);border-radius:.125rem;position:relative;cursor:pointer}
        #cheio{height:100%;background:#fff;border-radius:.125rem;width:0%}
        .tempo{display:flex;justify-content:between;margin-top:.5rem;font-size:.75rem;color:var(--cinza)}
        .controles{display:flex;justify-content:center;align-items:center;gap:2.5rem;margin-bottom:2.5rem}button{background:none;border:none;color:#fff;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;outline:none}
        .play{width:4.5rem;height:4.5rem;background:#fff;color:#000;border-radius:50%}
        .tempo time:last-child{margin-left:auto}
    </style>
</head>
<body>

    <main>
        <figure>
            <div class="capa">
                <svg width="200" height="200" viewBox="0 0 24 24" fill="#444">
                    <path d="M12 1c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/>
                </svg>
            </div>
        </figure>

        <section class="faixa">
            <h2 id="titulo"></h2>
        </section>

        <section class="progresso">
            <div id="barra">
                <div id="cheio"></div>
            </div>
            <div class="tempo">
                <time id="atual">0:00</time>
                <time id="total">0:00</time>
            </div>
        </section>

        <nav class="controles">
            <button id="voltar" aria-label="Anterior">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="play" id="botao" aria-label="Reproduzir/Pausar">
                <svg id="liga" width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg id="para" width="36" height="36" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button id="pular" aria-label="Próximo">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </nav>
    </main>

    <audio id="som"></audio>

    <script>
        const faixas = [
            { t: "OLTP vs OLAP", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/1.wav" },
            { t: "Centralização Drogarias XPTO", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/2.wav" },
            { t: "Processo ETL", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/3.wav" },
            { t: "Granularidade", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/4.wav" },
            { t: "Star Schema vs Snowflake", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/5.wav" },
            { t: "Operações Drill-Down", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/6.wav" },
            { t: "BI Seleção Alemã", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/7.wav" },
            { t: "Propriedades do DW", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/8.wav" },
            { t: "Sistemas Especialistas", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/9.wav" },
            { t: "Churn: Descritiva vs Preditiva", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/10.wav" },
            { t: "Data Storytelling", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/11.wav" },
            { t: "Viés na IA", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/12.wav" },
            { t: "IA vs Analistas", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/13.wav" },
            { t: "Surrogate Keys", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/14.wav" },
            { t: "Análise Prescritiva", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/15.wav" },
            { t: "Operações OLAP", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/16.wav" },
            { t: "Dicas", s: "https://raw.githubusercontent.com/fabziano/revisao/main/audio/17.wav" }
        ];

        let index = 0;
        const dom = {
            som: document.getElementById('som'),
            titulo: document.getElementById('titulo'),
            cheio: document.getElementById('cheio'),
            atual: document.getElementById('atual'),
            total: document.getElementById('total'),
            barra: document.getElementById('barra'),
            liga: document.getElementById('liga'),
            para: document.getElementById('para'),
            botao: document.getElementById('botao')
        };

        const fmt = s => {
            if (isNaN(s)) return "0:00";
            const m = (s / 60) | 0;
            const sc = (s % 60) | 0;
            return m + ":" + (sc < 10 ? "0" : "") + sc;
        };

        const interface = p => {
            dom.liga.style.display = p ? 'none' : 'block';
            dom.para.style.display = p ? 'block' : 'none';
        };

        const carregar = (i, p = true) => {
            index = (i + faixas.length) % faixas.length;
            const f = faixas[index];
            dom.titulo.textContent = f.t;
            dom.som.src = f.s;
            if (p) dom.som.play().then(() => interface(true)).catch(() => interface(false));
        };

        dom.botao.onclick = () => {
            if (dom.som.paused) { dom.som.play(); interface(true); }
            else { dom.som.pause(); interface(false); }
        };

        document.getElementById('voltar').onclick = () => carregar(index - 1);
        document.getElementById('pular').onclick = () => carregar(index + 1);

        dom.som.ontimeupdate = () => {
            const d = dom.som.duration;
            const a = dom.som.currentTime;
            dom.cheio.style.width = ((a / d) * 100) + "%";
            dom.atual.textContent = fmt(a);
        };

        dom.som.onloadedmetadata = () => dom.total.textContent = fmt(dom.som.duration);
        dom.som.onended = () => carregar(index + 1);

        dom.barra.onclick = e => {
            const r = dom.barra.getBoundingClientRect();
            dom.som.currentTime = ((e.clientX - r.left) / r.width) * dom.som.duration;
        };

        carregar(0, false);
    </script>
</body>
</html>
